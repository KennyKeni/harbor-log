name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install harbor PyYAML
      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -p 'test_*.py'

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test --manifest-path watcher-rs/Cargo.toml

  helper-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - name: Install cross
        run: cargo install cross --locked
      - name: Build helper binaries
        run: |
          cross build --manifest-path watcher-rs/Cargo.toml --release --target x86_64-unknown-linux-musl
          cross build --manifest-path watcher-rs/Cargo.toml --release --target aarch64-unknown-linux-musl
      - name: Stage helper assets
        run: |
          python scripts/stage_helper_assets.py \
            --amd64 watcher-rs/target/x86_64-unknown-linux-musl/release/harbor-stream-helper \
            --arm64 watcher-rs/target/aarch64-unknown-linux-musl/release/harbor-stream-helper
      - uses: actions/upload-artifact@v4
        with:
          name: helper-assets
          path: |
            src/harbor_stream/assets/harbor-stream-helper-linux-amd64
            src/harbor_stream/assets/harbor-stream-helper-linux-arm64

  packaging-smoke:
    needs: helper-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            venv_python: .venv/bin/python
          - os: macos-latest
            venv_python: .venv/bin/python
          - os: windows-latest
            venv_python: .venv/Scripts/python.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: helper-assets
          path: src/harbor_stream/assets
      - name: Build and install package
        shell: bash
        run: |
          python -m venv .venv
          "${{ matrix.venv_python }}" -m pip install --upgrade pip build
          "${{ matrix.venv_python }}" -m build
          "${{ matrix.venv_python }}" -m pip install dist/*.whl
      - name: Smoke import
        shell: bash
        run: |
          "${{ matrix.venv_python }}" -c "import harbor_stream; print('ok')"
          "${{ matrix.venv_python }}" -m harbor_stream.cli run --help

  docker-e2e:
    needs: helper-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: helper-assets
          path: src/harbor_stream/assets
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Run Docker e2e tests
        env:
          HARBOR_STREAM_RUN_E2E: "1"
          HARBOR_STREAM_TEST_TASK_PATH: /tmp/harbor/examples/tasks/hello-world
          HARBOR_STREAM_DOCKER_HOST: 172.17.0.1
        run: |
          git clone --depth 1 https://github.com/harbor-framework/harbor /tmp/harbor
          python -m unittest tests.test_e2e
