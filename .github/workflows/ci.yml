name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install harbor PyYAML
      - name: Run unit tests
        run: bash scripts/test-python.sh

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: bash scripts/test-rust.sh

  helper-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl
      - name: Build and stage helper assets
        run: bash scripts/build-helper-assets.sh
      - uses: actions/upload-artifact@v4
        with:
          name: helper-assets
          path: |
            src/harbor_stream/assets/harbor-stream-helper-linux-amd64
            src/harbor_stream/assets/harbor-stream-helper-linux-arm64

  packaging-smoke:
    needs: helper-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            venv_python: .venv/bin/python
          - os: macos-latest
            venv_python: .venv/bin/python
          - os: windows-latest
            venv_python: .venv/Scripts/python.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: helper-assets
          path: src/harbor_stream/assets
      - name: Build and install package
        shell: bash
        env:
          PYTHON_BIN: python
          VENV_DIR: .venv
          VENV_PYTHON: ${{ matrix.venv_python }}
        run: bash scripts/package-smoke.sh

  docker-e2e:
    needs: helper-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          name: helper-assets
          path: src/harbor_stream/assets
      - name: Run Docker e2e tests
        env:
          PYTHON_BIN: python
          INSTALL_PACKAGE: "1"
          HARBOR_STREAM_RUN_E2E: "1"
          HARBOR_STREAM_TEST_TASK_PATH: /tmp/harbor/examples/tasks/hello-world
          HARBOR_STREAM_DOCKER_HOST: 172.17.0.1
        run: bash scripts/e2e-docker.sh
